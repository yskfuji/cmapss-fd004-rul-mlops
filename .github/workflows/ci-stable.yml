name: ci-stable

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-lock.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
      - name: Lint
        run: ruff check src tests scripts

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Validate security exception register
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path("docs/governance/security-exceptions.md").read_text(encoding="utf-8")
          required_vulns = ["CVE-2025-69872", "CVE-2026-4539"]
          required_markers = ["Temporary mitigation", "Review by", "Owner", "Decision"]

          missing = [item for item in required_vulns if item not in text]
          missing.extend(marker for marker in required_markers if marker not in text)
          if missing:
              raise SystemExit(f"security exception register is missing: {missing}")
          PY
      - name: Audit Python dependencies
        run: |
          # Every ignored advisory must stay documented in docs/governance/security-exceptions.md.
          pip-audit \
            --ignore-vuln CVE-2025-69872 \
            --ignore-vuln CVE-2026-4539 \
            -r requirements-lock.txt
          pip-audit -r requirements-experimental-lock.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Audit Node dependencies
        run: npm audit --audit-level=high
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-lock.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
      - name: Type check critical modules
        env:
          MYPYPATH: src
        run: |
          mypy --explicit-package-bases \
            src/forecasting_api/file_store.py \
            src/forecasting_api/logging_config.py \
            src/forecasting_api/metrics.py \
            src/forecasting_api/model_promotion.py \
            src/models/gbdt_pipeline.py \
            src/monitoring/drift_detector.py \
            scripts/promote_model.py \
            scripts/generate_drift_report.py \
            scripts/build_drift_baseline.py
      - name: Type check staged service modules
        env:
          MYPYPATH: src
        run: |
          mypy --explicit-package-bases --follow-imports=silent \
            src/forecasting_api/app.py \
            src/forecasting_api/routers/*.py \
            src/forecasting_api/services/*.py \
            src/forecasting_api/job_store.py \
            src/forecasting_api/mlflow_runs.py \
            src/forecasting_api/schemas/__init__.py

  test:
    runs-on: ubuntu-latest
    needs: [lint, security, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-lock.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
      - name: Run stable tests
        env:
          PYTHONPATH: src
          RULFM_FORECASTING_API_KEY: ci-test-key
        run: pytest -m "not experimental" --cov=src --cov-report=term-missing --cov-fail-under=72

  postgres-job-store-compose:
    runs-on: ubuntu-latest
    needs: [lint, security, typecheck]
    env:
      RULFM_FORECASTING_API_KEY: ci-compose-key
      GF_SECURITY_ADMIN_USER: ci-admin
      GF_SECURITY_ADMIN_PASSWORD: ci-admin-password
      RULFM_TEST_POSTGRES_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}-postgres
    steps:
      - uses: actions/checkout@v4
      - name: Run PostgreSQL JobStore compose profile
        run: docker compose --profile test up --build --abort-on-container-exit --exit-code-from job-store-postgres-test job-store-postgres-test
      - name: Tear down compose test profile
        if: always()
        run: docker compose --profile test down --volumes

  coverage-80-monitor:
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-lock.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
      - name: Coverage monitor 80 (promotion target)
        env:
          PYTHONPATH: src
          RULFM_FORECASTING_API_KEY: ci-test-key
        run: pytest -m "not experimental" --cov=src --cov-report=term-missing --cov-fail-under=80

  mlflow-smoke:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-lock.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
      - name: Verify MLflow file-backed run
        env:
          PYTHONPATH: src
          RULFM_MLFLOW_TRACKING_URI: file:${{ github.workspace }}/.mlruns-ci
          RULFM_MLFLOW_EXPERIMENT: ci-smoke
        run: pytest tests/unit/test_mlflow_runs.py -k real_file_tracking_creates_mlflow_run -q

  benchmark:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-lock.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
      - name: Benchmark smoke
        env:
          PYTHONPATH: src
          RULFM_BENCHMARK_STAGE: gbdt-only
          RULFM_BENCHMARK_GBDT_PRESET: fast
          RULFM_BENCHMARK_ENABLE_GBDT_ENSEMBLE: '0'
        run: python scripts/build_fd004_benchmark_summary.py

  benchmark-artifact-regression:
    runs-on: ubuntu-latest
    needs: [benchmark]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-lock.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
      - name: Benchmark artifact regression
        env:
          PYTHONPATH: src
        run: pytest tests/regression/ -v

  dvc-dry-run:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-lock.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
      - name: Validate DVC pipeline graph
        run: dvc repro --dry

  e2e:
    runs-on: ubuntu-latest
    needs: [test, benchmark-artifact-regression]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install Node dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-lock.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
      - name: Run Playwright E2E
        env:
          PYTHONPATH: src
          RULFM_FORECASTING_API_KEY: e2e-test-key
        run: npm run test:e2e
