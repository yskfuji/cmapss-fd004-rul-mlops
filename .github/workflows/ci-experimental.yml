name: ci-experimental

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  experimental-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements-lock.txt
            requirements-experimental-lock.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
          pip install -r requirements-experimental-lock.txt
      - name: Run experimental tests
        env:
          PYTHONPATH: src
          RULFM_FORECASTING_API_KEY: exp-test-key
          RULFM_ENABLE_EXPERIMENTAL_MODELS: '1'
        run: |
          pytest \
            --override-ini="addopts=-q -p no:dash" \
            tests/unit/test_torch_forecasters.py \
            tests/unit/test_torch_asymmetric_rul_loss.py \
            tests/integration/test_train_endpoint.py \
            tests/integration/test_forecast_endpoint.py \
            -m experimental \
            --cov=forecasting_api.torch_forecasters \
            --cov-config=/dev/null \
            --cov-report=term-missing \
            --cov-fail-under=45